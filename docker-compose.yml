version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEWS_API_KEY: ${NEWS_API_KEY1}
    image: nextnews-app:latest
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEWS_API_KEY: ${NEWS_API_KEY1}  # Using NEWS_API_KEY1 as the primary
      # Add other env vars as needed
    # Uncomment the following to run in development mode (hot reload)
    # command: ["npm", "run", "dev", "--", "--hostname", "0.0.0.0"]
    # volumes:
    #   - .:/app
    #   - /app/node_modules
    # ports:
    #   - "3000:3000"
